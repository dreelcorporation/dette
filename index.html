<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CréanceControl Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header>
        <h1>⚖️ CréanceControl</h1>
        <p>Gérez vos documents officiels et suivez vos remboursements</p>
    </header>

    <div class="grid-layout">
        <section class="card">
            <h3>Nouveau Document</h3>
            <form id="creanceForm">
                <div class="form-group">
                    <label>Nom du Créancier</label>
                    <input type="text" id="creancier" placeholder="Ex: Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label>Nom du Débiteur</label>
                    <input type="text" id="debiteur" placeholder="Ex: Marie Martin" required>
                </div>
                <div class="form-group">
                    <label>Email du Débiteur</label>
                    <input type="email" id="email" placeholder="Ex: marie@email.com" required>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Montant (€)</label>
                        <input type="number" id="montant" placeholder="500" required>
                    </div>
                    <div class="form-group">
                        <label>Date d'échéance</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="button" class="btn-primary" onclick="creerDossier()">Générer & Enregistrer</button>
            </form>
        </section>

        <section class="card">
            <h3>Suivi des Créances</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Débiteur</th>
                            <th>Montant</th>
                            <th>Échéance</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listeClients">
                        </tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
