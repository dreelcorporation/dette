<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Créance Officiel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>📄 Générateur de Reconnaissance de Dette</h2>
        <form id="creanceForm">
            <div class="section">
                <h3>Le Créancier (Celui qui prête)</h3>
                <input type="text" id="nomCreancier" placeholder="Nom Complet" required>
                <input type="text" id="adresseCreancier" placeholder="Adresse">
            </div>

            <div class="section">
                <h3>Le Débiteur (Celui qui doit)</h3>
                <input type="text" id="nomDebiteur" placeholder="Nom Complet" required>
                <input type="text" id="adresseDebiteur" placeholder="Adresse">
            </div>

            <div class="section">
                <h3>Détails de la Créance</h3>
                <input type="number" id="montant" placeholder="Montant en €" required>
                <input type="date" id="dateEcheance" required>
            </div>

            <button type="button" onclick="genererPDF()">Générer le Document Officiel</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
<input type="email" id="emailDestinataire" placeholder="Email du destinataire" required>
